name: Release

on:
  push:
    tags:
      - 'capacitor-*@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. capacitor-sensors@1.0.2)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install
      - name: Extract package info from tag
        id: package
        run: |
          TAG=${{ github.event.inputs.tag || '' }}
          if [ -z "$TAG" ]; then
            TAG=${GITHUB_REF#refs/tags/}
          fi
          PKG_NAME=${TAG%@*}
          TAG_VERSION=${TAG##*@}
          FOLDER=${PKG_NAME#capacitor-}
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Verify tag version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./packages/${{ steps.package.outputs.folder }}/package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.package.outputs.version }}" ]; then
            echo "Version mismatch: tag=${{ steps.package.outputs.version }} package.json=$PKG_VERSION"
            exit 1
          fi
      - name: Build
        run: bun run build
      - name: Publish
        run: |
          cd "packages/${{ steps.package.outputs.folder }}"
          npm publish
      - name: Extract release notes
        run: |
          node -e "
            const fs = require('fs');
            const version = '${{ steps.package.outputs.version }}';
            const file = 'packages/${{ steps.package.outputs.folder }}/CHANGELOG.md';
            const lines = fs.readFileSync(file, 'utf8').split('\n');
            const start = lines.findIndex(l => l.trim().startsWith('## ' + version));
            if (start === -1) { console.error('Version section not found'); process.exit(1); }
            let end = lines.findIndex((l, i) => i > start && l.trim().startsWith('## '));
            if (end === -1) end = lines.length;
            const section = lines.slice(start + 1, end).join('\n').trim();
            fs.writeFileSync('/tmp/release-notes.md', section || '_No notable changes._');
          "
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.package.outputs.tag }}
          name: ${{ steps.package.outputs.tag }}
          body_path: /tmp/release-notes.md

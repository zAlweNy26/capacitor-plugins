name: Release

on:
  push:
    tags:
      - 'capacitor-*@*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. capacitor-sensors@1.0.2)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: bun install
      - name: Extract package info from tag
        id: package
        run: |
          TAG=${{ github.event.inputs.tag || '' }}
          if [ -z "$TAG" ]; then
            TAG=${GITHUB_REF#refs/tags/}
          fi
          PKG_NAME=${TAG%@*}
          TAG_VERSION=${TAG##*@}
          FOLDER=${PKG_NAME#capacitor-}
          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
      - name: Verify tag version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./packages/${{ steps.package.outputs.folder }}/package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.package.outputs.version }}" ]; then
            echo "Version mismatch: tag=${{ steps.package.outputs.version }} package.json=$PKG_VERSION"
            exit 1
          fi
      - name: Build
        run: bun run build
      - name: Publish
        run: |
          cd "packages/${{ steps.package.outputs.folder }}"
          npm publish
